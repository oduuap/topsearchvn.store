<VirtualHost *:80>
    ServerName topsearchvn.store
    ServerAlias www.topsearchvn.store

    ProxyPreserveHost On
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    ErrorLog /var/log/apache2/topsearchvn_error.log
    CustomLog /var/log/apache2/topsearchvn_access.log combined
</VirtualHost>
